# ce-bench — portable fabric benchmarks + the ce-echo responder. Installed + supervised by the one `ce` node via ce-appmgr.
[app]
name = "ce-bench"
version = "0.0.1"
summary = "Signed compute/memory/network benchmarks; daemon runs the ce-echo responder so other nodes can measure mesh RPC against this one."
runtime = "oci"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"
[oci]
# placeholder base; real packaging (node + bin/ce-echo.js) is a follow-up. Also ships the ce-netbench CLI.
image = "node:22-slim"
[sandbox]
tier = "gvisor"
net  = "loopback"
[daemon]
enabled = true
restart = "on-failure"
